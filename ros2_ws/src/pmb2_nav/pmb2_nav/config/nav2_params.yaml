amcl:
  ros__parameters:
    use_sim_time: False #Cambiado a robot real False
    base_frame_id: "base_footprint"
    global_frame_id: "map"
    odom_frame_id: "odom"
    scan_topic: "/scan_fixed" #Cambiado a robot real /scan_raw
    tf_broadcast: true
    set_initial_pose: False
    laser_model_type: "likelihood_field"
    max_particles: 2000
    min_particles: 500
    update_min_d: 0.25
    update_min_a: 0.2

amcl_map_client:
  ros__parameters:
    use_sim_time: False #Cambiado

amcl_rclcpp_node:
  ros__parameters:
    use_sim_time: False #Cambiado


bt_navigator:
  ros__parameters:
    use_sim_time: False #Cambiado
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /mobile_base_controller/odom #Cambiado Gazebo /odom

    default_bt_xml_filename: "/opt/ros/foxy/share/nav2_bt_navigator/behavior_trees/navigate_w_replanning_and_recovery.xml"

    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_rate_controller_bt_node

controller_server:
  ros__parameters:
    use_sim_time: False #Cambiado
    controller_frequency: 5.0 #Cambiado de 10.0
    min_x_velocity_threshold: 0.001 #
    min_y_velocity_threshold: 0.001 #
    min_theta_velocity_threshold: 0.001 #
    cmd_vel_topic: /nav_vel
    controller_plugins: ["FollowPath"]
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.05 #
      movement_time_allowance: 30.0 #

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.20
      yaw_goal_tolerance: 0.5 #
      stateful: true
    FollowPath:
      debug_trajectory_details: True
      short_circuit_trajectory_evaluation: True #
      plugin: "dwb_core::DWBLocalPlanner"
      max_vel_x: 0.3
      min_vel_x: 0.0
      max_vel_theta: 1.0 #
      min_vel_theta: -1.0
      min_speed_xy: 0.0
      max_speed_xy: 0.22
      min_speed_theta: 0.05
      acc_lim_x: 1.5
      acc_lim_theta: 2.5 #
      decel_lim_x: -1.5
      decel_lim_theta: -2.5
      vx_samples: 20
      vtheta_samples: 30 #
      sim_time: 1.7 #Antes 1.0
      # --- TOLERANCIAS DE OBJETIVO (AÑADIDAS) ---
      transform_tolerance: 0.2
      
      # --- CRÍTICOS ACTIVOS ---
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      
      # Clases explícitas para ROS 2 Foxy:
      RotateToGoal.class: "dwb_critics::RotateToGoalCritic"
      #Oscillation.class: "dwb_critics::OscillationCritic"
      BaseObstacle.class: "dwb_critics::BaseObstacleCritic"
      #GoalAlign.class: "dwb_critics::GoalAlignCritic"
      #PathAlign.class: "dwb_critics::PathAlignCritic"
      PathDist.class: "dwb_critics::PathDistCritic"
      GoalDist.class: "dwb_critics::GoalDistCritic"

      #CONFIGURACIÓN DE ESCALAS
      BaseObstacle.scale: 1.0
      
      PathAlign.scale: 8.0 #Cambiado de 64
      PathAlign.forward_point_distance: 0.1
      
      GoalAlign.scale: 8.0 #Cambiado
      GoalAlign.forward_point_distance: 0.1
      
      PathDist.scale: 32.0 #Cambiado de 64.0
      GoalDist.scale: 16.0
      
      RotateToGoal.scale: 0.5 #Cambiado
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0
      RotateToGoal.stateful: True
    

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: False #Cambiado
      transform_tolerance: 1.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      robot_radius: 0.30
      plugins: ["obstacle_layer", "inflation_layer"]
      #
      update_frequency: 10.0
      publish_frequency: 5.0
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: scan
        scan:
          topic: /scan_fixed #Cambiado de /scan_raw
          data_type: "LaserScan"
          marking: true
          clearing: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.50 #Cambiado de 0.30


global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: False #Cambiado
      transform_tolerance: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      resolution: 0.05
      robot_radius: 0.30
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      #
      update_frequency: 2.0
      publish_frequency: 1.0

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: scan
        scan:
          topic: /scan_fixed #Cambiado de /scan_raw
          data_type: "LaserScan"
          marking: true
          clearing: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.50 #Cambiado de 0.30


map_server:
  ros__parameters:
    use_sim_time: False #Cambiado
    yaml_filename: "/home/sergio/ros2_ws/src/pmb2_nav/pmb2_nav/maps/mapapasillo.yaml" #Cambiado Gazebo


planner_server:
  ros__parameters:
    use_sim_time: False #Cambiado
    expected_planner_frequency: 2.0
    planner_plugins: ["GridBased"]
    

    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: true
      allow_unknown: true


recoveries_server:
  ros__parameters:
    use_sim_time: False #Cambiado
    cycle_frequency: 10.0
    recovery_plugins: ["spin", "back_up", "wait"]

    spin:
      plugin: "nav2_recoveries/Spin"
    back_up:
      plugin: "nav2_recoveries/BackUp"
    wait:
      plugin: "nav2_recoveries/Wait"


lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: False #Cambiado
    autostart: true
    node_names:
      - map_server
      - amcl
      - controller_server
      - planner_server
      - recoveries_server
      - bt_navigator